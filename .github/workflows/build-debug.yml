name: Build Debug APK

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "libxposed-api-stubs/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - ".github/lsposed/**"
      - ".github/workflows/build-debug.yml"
      - "scripts/validate-lsposed-metadata.ps1"
  pull_request:
    paths:
      - "app/**"
      - "libxposed-api-stubs/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - ".github/lsposed/**"
      - ".github/workflows/build-debug.yml"
      - "scripts/validate-lsposed-metadata.ps1"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate LSPosed repository metadata
        shell: pwsh
        run: ./scripts/validate-lsposed-metadata.ps1

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: coloros-live-lyrics-bridge-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
