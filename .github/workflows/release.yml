name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.1.0. The APK versionName becomes 1.1.0."
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to the tag when empty."
        required: false
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish signed release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate LSPosed repository metadata
        shell: pwsh
        run: ./scripts/validate-lsposed-metadata.ps1

      - name: Decode signing key
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          for secret in SIGNING_KEY KEY_STORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!secret}" ]; then
              echo "::error title=Missing signing secret::$secret is not configured."
              exit 1
            fi
          done

          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/keystore/release.jks"

      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/keystore/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: ./gradlew :app:assembleRelease

      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
            "release-artifacts/ColorOS-Live-Lyrics-Bridge-${{ inputs.tag }}.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name || inputs.tag }}
          body_path: docs/releases/${{ inputs.tag }}.md
          prerelease: ${{ inputs.prerelease }}
          files: release-artifacts/*.apk

      - name: Sync metadata to LSPosed module repo
        env:
          GH_TOKEN: ${{ secrets.LSP_REPO_TOKEN }}
          LSP_REPO: Xposed-Modules-Repo/io.github.andrealtb.lockscreenlyrics
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error title=Missing LSP_REPO_TOKEN::Set a PAT with content and release write access to $LSP_REPO."
            exit 1
          fi

          gh auth setup-git
          target_dir="$RUNNER_TEMP/lsposed-module-repo"
          gh repo clone "$LSP_REPO" "$target_dir" -- --depth 1
          cp .github/lsposed/README.md "$target_dir/README.md"
          cp .github/lsposed/SUMMARY "$target_dir/SUMMARY"
          cp .github/lsposed/SOURCE_URL "$target_dir/SOURCE_URL"
          cp .github/lsposed/SCOPE "$target_dir/SCOPE"

          cd "$target_dir"
          if [ -z "$(git status --porcelain -- README.md SUMMARY SOURCE_URL SCOPE)" ]; then
            echo "LSPosed repository metadata is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md SUMMARY SOURCE_URL SCOPE
          git commit -m "Sync module metadata for ${RELEASE_TAG}"
          git push origin HEAD:main

      - name: Sync release to LSPosed module repo
        env:
          GH_TOKEN: ${{ secrets.LSP_REPO_TOKEN }}
          LSP_REPO: Xposed-Modules-Repo/io.github.andrealtb.lockscreenlyrics
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name || inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error title=Missing LSP_REPO_TOKEN::Set a PAT with access to $LSP_REPO as the LSP_REPO_TOKEN repository secret."
            exit 1
          fi

          notes_file="docs/releases/${RELEASE_TAG}.md"
          version_code="$(jq -r '.elements[0].versionCode' app/build/outputs/apk/release/output-metadata.json)"
          version_name="$(jq -r '.elements[0].versionName' app/build/outputs/apk/release/output-metadata.json)"
          lsp_release_tag="${version_code}-${version_name}"

          if gh release view "$lsp_release_tag" --repo "$LSP_REPO" >/dev/null 2>&1; then
            gh release edit "$lsp_release_tag" \
              --repo "$LSP_REPO" \
              --title "$RELEASE_NAME" \
              --notes-file "$notes_file" \
              --prerelease="$PRERELEASE"
            gh release upload "$lsp_release_tag" release-artifacts/*.apk \
              --repo "$LSP_REPO" \
              --clobber
          else
            create_args=(
              "$lsp_release_tag"
              release-artifacts/*.apk
              --repo "$LSP_REPO"
              --target main
              --title "$RELEASE_NAME"
              --notes-file "$notes_file"
            )
            if [ "$PRERELEASE" = "true" ]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          fi
