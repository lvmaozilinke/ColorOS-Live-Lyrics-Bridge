name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.1.0. The APK versionName becomes 1.1.0."
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to the tag when empty."
        required: false
        type: string
      prerelease:
        description: "Mark this release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish signed release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Decode signing key
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          for secret in SIGNING_KEY KEY_STORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!secret}" ]; then
              echo "::error title=Missing signing secret::$secret is not configured."
              exit 1
            fi
          done

          mkdir -p "$RUNNER_TEMP/keystore"
          printf '%s' "$SIGNING_KEY" | base64 --decode > "$RUNNER_TEMP/keystore/release.jks"

      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/keystore/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: ./gradlew :app:assembleRelease

      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
            "release-artifacts/ColorOS-Live-Lyrics-Bridge-${{ inputs.tag }}.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name || inputs.tag }}
          body_path: docs/releases/${{ inputs.tag }}.md
          prerelease: ${{ inputs.prerelease }}
          files: release-artifacts/*.apk
